<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FPS Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; touch-action: none; }
    canvas { display: block; }
    
    /* Start Menu */
    #start-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 300;
      cursor: pointer;
    }
    #start-menu.hidden {
      display: none;
    }
    #start-menu img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: #000;
    }
    
    /* Mute button */
    #mute-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, 0.6);
      border: 3px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      cursor: pointer;
      z-index: 301;
      transition: background 0.2s;
    }
    #mute-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }
    #mute-btn.hidden {
      display: none;
    }
    
    /* Mobile - fill screen without cropping */
    @media (max-aspect-ratio: 1/1) {
      #start-menu img {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
      }
    }
    
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 100;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
    }
    #crosshair::before {
      width: 2px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
    }
    #blocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    #instructions {
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #instructions h1 { font-size: 36px; margin-bottom: 20px; }
    #instructions p { font-size: 16px; line-height: 1.6; }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: monospace;
      font-size: 16px;
      z-index: 100;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
    
    /* Mobile Controls */
    .mobile-controls {
      display: none;
      position: fixed;
      z-index: 150;
      pointer-events: none;
    }
    .mobile-controls.active {
      display: block;
    }
    
    /* Joystick */
    #joystick-zone {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 40%;
      height: 50%;
      pointer-events: auto;
    }
    #joystick-base {
      position: absolute;
      left: 30px;
      bottom: 30px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 50%;
    }
    #joystick-stick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
    }
    
    /* Look zone (right side of screen) */
    #look-zone {
      position: fixed;
      right: 0;
      top: 0;
      width: 60%;
      height: 70%;
      pointer-events: auto;
    }
    
    /* Action buttons */
    #shoot-btn {
      position: fixed;
      right: 30px;
      bottom: 30px;
      width: 80px;
      height: 80px;
      background: rgba(255, 50, 50, 0.6);
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      pointer-events: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #shoot-btn:active {
      background: rgba(255, 100, 100, 0.8);
    }
    
    #jump-btn {
      display: none; /* Jump button disabled - mini-hops instead */
    }
    #jump-btn:active {
      background: rgba(100, 180, 255, 0.8);
    }
    
    /* Turn buttons */
    #turn-left, #turn-right {
      position: fixed;
      bottom: 120px;
      width: 50px;
      height: 50px;
      background: rgba(150, 150, 150, 0.6);
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      pointer-events: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
    }
    #turn-left { right: 140px; }
    #turn-right { right: 30px; }
    #turn-left:active, #turn-right:active {
      background: rgba(200, 200, 200, 0.8);
    }
    
    /* Damage flash overlay */
    #damage-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(255, 0, 0, 0.6) 100%);
      pointer-events: none;
      opacity: 0;
      z-index: 90;
      transition: opacity 0.1s ease-out;
    }
    #damage-flash.active {
      opacity: 1;
    }
    
    /* Heal flash overlay */
    #heal-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 255, 0, 0.6) 100%);
      pointer-events: none;
      opacity: 0;
      z-index: 90;
      transition: opacity 0.2s ease-out;
    }
    #heal-flash.active {
      opacity: 1;
    }
    
    /* Low Health Warning */
    #low-health-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 10px solid rgba(255, 0, 0, 0);
      pointer-events: none;
      z-index: 85;
      box-sizing: border-box;
    }
    #low-health-warning.active {
      animation: lowHealthPulse 1.5s ease-in-out infinite;
    }
    @keyframes lowHealthPulse {
      0%, 100% {
        border-color: rgba(255, 0, 0, 0.3);
      }
      50% {
        border-color: rgba(255, 0, 0, 0.8);
      }
    }
    
    /* Doom-style weapon sprite */
    #weapon-sprite {
      position: fixed;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      max-width: 600px;
      height: auto;
      pointer-events: none;
      z-index: 999;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    
    @media (max-width: 768px) {
      #weapon-sprite {
        width: 80vw;
        max-width: none;
        bottom: -80px;
      }
    }
  </style>
</head>
<body>
  <!-- Initial Entry Screen -->
  <div id="entry-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 400; cursor: pointer;">
    <div style="text-align: center; color: white; font-family: Arial, sans-serif;">
      <h1 style="font-size: 48px; margin-bottom: 20px;">🎮 GAME</h1>
      <p style="font-size: 24px; animation: pulse 1.5s ease-in-out infinite;">CLICK TO ENTER</p>
    </div>
  </div>
  
  <!-- Start Menu -->
  <div id="start-menu" style="display: none;">
    <img id="start-menu-img" src="/start-menu-1.png" alt="Start Menu">
    <div id="mute-btn" title="Toggle Music">🔊</div>
  </div>
  
  <!-- Menu Music -->
  <audio id="menu-music" loop>
    <source src="/menu-music.mp3" type="audio/mpeg">
  </audio>
  
  <!-- Gameplay Music -->
  <audio id="gameplay-music" loop>
    <source src="/gameplay-music.mp3" type="audio/mpeg">
  </audio>
  
  <!-- Sound Effects -->
  <audio id="zombie-punch-sound">
    <source src="/zombie-punch.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="gunshot-sound">
    <source src="/gunshot.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="villain-death-sound">
    <source src="/villain-death.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="zombie-attack-sound">
    <source src="/zombie-attack.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="zombie-death-sound">
    <source src="/zombie-death.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="health-pack-sound">
    <source src="/health-pack-pickup.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="zombie-voice-sound">
    <source src="/zombie-voice.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="villain-voice-sound">
    <source src="/villain-voice.mp3" type="audio/mpeg">
  </audio>
  
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
  
  <div id="blocker">
    <div id="instructions" style="cursor: pointer;">
      <h1>🎮 FPS GAME</h1>
      <p id="desktop-instructions"><strong>CLICK ANYWHERE TO PLAY</strong><br>WASD - Move | SPACE - Jump | MOUSE - Look | CLICK - Shoot</p>
      <p id="mobile-instructions" style="display:none;">Tap to play<br>Left joystick - Move | Drag right side - Look<br>🔴 Shoot | 🔵 Jump</p>
    </div>
  </div>
  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="heal-flash"></div>
  <div id="low-health-warning"></div>
  <img id="weapon-sprite" src="/gun-idle.png" alt="Weapon" style="display: none;">
  <div id="hud">
    <div>Health: <span id="health">100</span></div>
    <div>Ammo: <span id="ammo">30</span></div>
  </div>
  
  <!-- Mobile Controls -->
  <div class="mobile-controls" id="mobile-controls">
    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-stick"></div>
      </div>
    </div>
    <div id="look-zone"></div>
    <div id="shoot-btn">🔫</div>
    <div id="jump-btn">⬆</div>
    <div id="turn-left">◀</div>
    <div id="turn-right">▶</div>
  </div>
  
  <script>
    // Entry Screen and Menu Logic
    const entryScreen = document.getElementById('entry-screen');
    const startMenu = document.getElementById('start-menu');
    const startMenuImg = document.getElementById('start-menu-img');
    const menuMusic = document.getElementById('menu-music');
    const gameplayMusic = document.getElementById('gameplay-music');
    const muteBtn = document.getElementById('mute-btn');
    const images = ['/start-menu-1.png', '/start-menu-2.png'];
    let currentImageIndex = 0;
    let intervalId;
    let isMuted = false;
    
    menuMusic.volume = 0.5; // Set volume to 50%
    gameplayMusic.volume = 0.5; // Set volume to 50%

    // Entry screen - click to enter and start music
    entryScreen.addEventListener('click', () => {
      // Start music
      menuMusic.play().then(() => {
        console.log('Menu music started');
      }).catch(e => {
        console.log('Music play failed:', e);
      });
      
      // Hide entry screen, show menu
      entryScreen.style.display = 'none';
      startMenu.style.display = 'flex';
      
      // Start alternating menu images
      alternateImages();
    });
    
    // Also accept keyboard input on entry screen
    document.addEventListener('keydown', (e) => {
      if (entryScreen.style.display !== 'none') {
        entryScreen.click();
      }
    });

    // Alternate images every 1 second
    function alternateImages() {
      intervalId = setInterval(() => {
        currentImageIndex = (currentImageIndex + 1) % 2;
        startMenuImg.src = images[currentImageIndex];
      }, 1000);
    }
    
    // Mute button toggle
    muteBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // Prevent starting the game
      isMuted = !isMuted;
      menuMusic.muted = isMuted;
      gameplayMusic.muted = isMuted;
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });

    // Click to start game
    startMenu.addEventListener('click', (e) => {
      if (e.target === muteBtn || muteBtn.contains(e.target)) return; // Don't start game if clicking mute button
      clearInterval(intervalId);
      
      // Stop menu music
      menuMusic.pause();
      menuMusic.currentTime = 0;
      
      // Start gameplay music
      gameplayMusic.play().then(() => {
        console.log('Gameplay music started');
      }).catch(e => {
        console.log('Gameplay music play failed:', e);
      });
      
      startMenu.style.display = 'none';
      
      // Trigger the actual game start event (simulate clicking blocker)
      const blocker = document.getElementById('blocker');
      const instructions = document.getElementById('instructions');
      if (blocker && instructions) {
        instructions.click();
      }
    });
  </script>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
